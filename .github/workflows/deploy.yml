name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: coderunner-front
  CONTAINER_NAME: coderunner-front
  DEPLOY_PATH: /root/workspace/codeRunner/codeRunner-backend/codeRunner-front

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Pull latest code
            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              mkdir -p ${{ env.DEPLOY_PATH }}
              git clone https://github.com/ningzhaoxing/codeRunner-front.git ${{ env.DEPLOY_PATH }}
            fi
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main

            # Build image on server
            /usr/bin/docker build \
              --build-arg NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }} \
              -t ${{ env.IMAGE_NAME }}:latest .

            # Restart container
            /usr/bin/docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            /usr/bin/docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            /usr/bin/docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ env.IMAGE_NAME }}:latest

            # Cleanup
            /usr/bin/docker image prune -f
